<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Penelope + Porky</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ff66b2;
      color: #000;
      text-align: center;
    }

    /* HEADER / NAV (BIGGER) */
    nav {
      background-color: #ffccdd;
      padding: 25px; /* bigger header bar */
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
      margin: 0 30px;
      font-size: 24px; /* bigger links */
    }

    nav a:hover {
      color: #d1006c;
    }

    /* BIGGER TITLE IMAGE */
    .title {
      width: 95%;              /* almost full width */
      max-width: 1400px;      /* bigger cap */
      height: auto;
      margin: 40px auto 0 auto;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* BUTTON CONTAINER */
    .buttons {
      margin: -220px auto 60px auto; /* stronger overlap + more space */
      position: relative;
      z-index: 2;
    }

    /* BIGGER BUTTONS */
    .button {
      background-color: white;
      color: #ff0066;
      font-size: 3.2rem;   /* bigger text */
      font-weight: bold;
      padding: 35px 90px;  /* bigger button */
      border: 5px solid #000;
      border-radius: 60px;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      margin: 25px;
    }

    .button:hover {
      background-color: #ff0066;
      color: white;
      transform: scale(1.1);
    }

    /* FOOTER (BIGGER) */
    footer {
      margin-top: 60px;
      padding: 30px;
      background: #ffccdd;
      color: #333;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Homepage</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- TITLE -->
  <img src="contact.png" alt="Contact Title" class="title">

  <!-- BIG FLOATING BUTTONS -->
  <div class="buttons">
    <a href="mailto:veronicafridman63@gmail.com" class="button">Email Me</a>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSd-ssSQKNLgYSm_mh1GhcekQbIgi-QZhsIto6U8qIlTZzZzwQ/viewform?usp=header" 
       class="button" target="_blank">
      Leave Feedback
    </a>
  </div>

  <footer>
    © 2025 Penelope + Porky. All Rights Reserved.
  </footer>

</body>
</html>
