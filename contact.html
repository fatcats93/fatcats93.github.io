<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Penelope + Porky</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ff66b2;
    color:#000;
    text-align:center;

    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* NAV */
nav{
    background:#ffccdd;
    padding:3vh 2vw;
    display:flex;
    justify-content:center;
    gap:6vw;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:#333;
    font-weight:bold;
    font-size:clamp(40px,4.5vw,80px);
    margin:0 40px;
}

/* CONTENT */
.content{
    flex:1;
}

/* 🔥 TITLE ONLY CHANGE (MADE BIGGER) */
.title{
    width:100vw;              /* was smaller before */
    max-width:1900px;        /* increased from 1600 */
    margin:4vh auto 0 auto;
    display:block;
}

/* BUTTONS (UNCHANGED) */
.buttons{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5vh;
    margin-top:-4vh;
    padding-bottom:6vh;
}

.button{
    background-color:white;
    color:#ff0066;
    font-weight:bold;

    font-size:clamp(28px,5vw,80px);
    line-height:1;

    padding:clamp(40px,8vh,90px) clamp(30px,10vw,160px);

    border:6px solid #000;
    border-radius:999px;

    text-decoration:none;
    transition:transform 0.2s ease, background-color 0.2s ease;

    display:flex;
    align-items:center;
    justify-content:center;

    width:92vw;
    max-width:1100px;

    letter-spacing:1px;
}

.button:hover{
    background-color:#ff0066;
    color:white;
    transform:scale(1.03);
}

/* FOOTER */
footer{
    background:#ffccdd;
    width:100%;
    padding:3vh 0;
    font-size:clamp(16px,2vw,22px);
    margin-top:auto;
}

</style>
</head>

<body>

<nav>
    <a href="index.html">Homepage</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="content">

    <img src="contact.png" class="title" alt="Contact Title">

    <div class="buttons">
        <a href="mailto:veronicafridman63@gmail.com" class="button">
            Email Me
        </a>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSd-ssSQKNLgYSm_mh1GhcekQbIgi-QZhsIto6U8qIlTZzZzwQ/viewform?usp=header"
           class="button" target="_blank">
            Leave Feedback
        </a>
    </div>

</div>

<footer>
    © 2025 Penelope + Porky. All Rights Reserved.
</footer>

</body>
</html>
