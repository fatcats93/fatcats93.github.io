<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Penelope + Porky</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ff66b2;
      color: #000;
      text-align: center;
    }

    nav {
      background-color: #ffccdd;
      padding: 15px;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
      margin: 0 20px;
      font-size: 18px;
    }

    nav a:hover {
      color: #d1006c;
    }

    /* TITLE */
    .title {
      width: 95%;
      max-width: 1300px;
      height: auto;
      margin: 30px auto 0 auto;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* BUTTON BOX (STRONGER OVERLAP) */
    .contact-box {
      background: white;
      padding: 40px;
      margin: -120px auto 30px auto; /* ⬅️ stronger overlap */
      width: 90%;
      max-width: 650px;
      border-radius: 20px;
      border: 3px solid #000;
      position: relative;
      z-index: 2;
    }

    /* BIGGER BUTTONS */
    .button {
      background-color: white;
      color: #ff0066;
      font-size: 2rem; /* ⬅️ bigger text */
      font-weight: bold;
      padding: 20px 45px; /* ⬅️ bigger button */
      border: 3px solid #000;
      border-radius: 35px;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      margin: 15px;
    }

    .button:hover {
      background-color: #ff0066;
      color: white;
      transform: scale(1.1);
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background: #ffccdd;
      color: #333;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Homepage</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- TITLE -->
  <img src="contact.png" alt="Contact Title" class="title">

  <!-- BIG OVERLAPPING BUTTONS -->
  <div class="contact-box">
    <a href="mailto:veronicafridman63@gmail.com" class="button">Email Me</a>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSd-ssSQKNLgYSm_mh1GhcekQbIgi-QZhsIto6U8qIlTZzZzwQ/viewform?usp=header" 
       class="button" target="_blank">
      Leave Feedback
    </a>
  </div>

  <footer>
    © 2025 Penelope + Porky. All Rights Reserved.
  </footer>

</body>
</html>
