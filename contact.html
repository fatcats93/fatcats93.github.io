<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Penelope + Porky</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ff66b2;
      color: #000;
      text-align: center;
    }

    /* ===== NAV (FULL WIDTH + RESPONSIVE) ===== */
    nav {
      background-color: #ffccdd;
      padding: 2.5vh 2vw;
      display: flex;
      justify-content: center;
      gap: 6vw;
      flex-wrap: wrap;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
      font-size: clamp(18px, 2.2vw, 28px);
    }

    nav a:hover {
      color: #d1006c;
    }

    /* ===== TITLE (TAKES MOST OF SCREEN) ===== */
    .title {
      width: 95vw;
      max-width: 1400px;
      height: auto;
      margin: 4vh auto 0 auto;
      display: block;
    }

    /* ===== BUTTON SECTION ===== */
    .buttons {
      margin-top: -8vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4vh;
      padding-bottom: 6vh;
    }

    /* BIG RESPONSIVE BUTTONS */
    .button {
      background-color: white;
      color: #ff0066;
      font-weight: bold;

      font-size: clamp(22px, 4vw, 52px);
      padding: clamp(18px, 3vh, 40px) clamp(40px, 8vw, 120px);

      border: 5px solid #000;
      border-radius: 999px;

      text-decoration: none;
      transition: transform 0.2s ease, background-color 0.2s ease;

      display: inline-block;
      width: 80vw;
      max-width: 700px;
    }

    .button:hover {
      background-color: #ff0066;
      color: white;
      transform: scale(1.05);
    }

    /* ===== FOOTER ===== */
    footer {
      margin-top: 6vh;
      padding: 3vh;
      background: #ffccdd;
      font-size: clamp(14px, 2vw, 18px);
    }

    /* ===== IPAD / SMALL LAPTOP ADJUSTMENTS ===== */
    @media (max-width: 1024px) {
      .buttons {
        margin-top: -5vh;
      }
    }

    /* ===== PHONE ADJUSTMENTS ===== */
    @media (max-width: 600px) {
      .buttons {
        margin-top: 0;
      }

      .button {
        width: 90vw;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Homepage</a>
    <a href="contact.html">Contact</a>
  </nav>

  <img src="contact.png" alt="Contact Title" class="title">

  <div class="buttons">
    <a href="mailto:veronicafridman63@gmail.com" class="button">Email Me</a>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSd-ssSQKNLgYSm_mh1GhcekQbIgi-QZhsIto6U8qIlTZzZzwQ/viewform?usp=header" 
       class="button" target="_blank">
      Leave Feedback
    </a>
  </div>

  <footer>
    © 2025 Penelope + Porky. All Rights Reserved.
  </footer>

</body>
</html>
